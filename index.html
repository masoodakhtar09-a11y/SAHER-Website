<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SAHER — Society for Awareness, Harmony and Equal Rights. Empowering youth in Mumbai since 1997.">
<title>SAHER — Society for Awareness, Harmony & Equal Rights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --saffron:    #E8622A;
  --saffron-dk: #C44E1E;
  --deep:       #1A1208;
  --teal:       #2A6B6E;
  --moss:       #4A6741;
  --gold:       #C9973A;
  --cream:      #F0E8D8;
  --warm:       #FAF6EF;
  --text:       #1E1810;
  --muted:      #7A6A55;
  --border:     rgba(0,0,0,0.09);
  --white:      #ffffff;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'DM Mono', monospace;

  --radius-sm: 3px;
  --radius-md: 6px;

  --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);

  --nav-h: 64px;
  --max-w: 1160px;
  --gutter: 2rem;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: var(--font-body); color: var(--text); background: var(--white); overflow-x: hidden; line-height: 1.6; }
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
ul { list-style: none; }

/* ============================================================
   UTILITIES
   ============================================================ */
.container  { max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter); }
.section    { padding: 6rem 0; }
.section-sm { padding: 4rem 0; }
.section-label {
  font-family: var(--font-mono);
  font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--saffron); display: block; margin-bottom: 0.75rem;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900; line-height: 1.1; color: var(--deep);
  margin-bottom: 1.25rem;
}
.section-title em { font-style: italic; color: var(--saffron); }
.section-body { font-size: 1rem; color: var(--muted); line-height: 1.8; max-width: 600px; font-weight: 300; }
.bg-warm  { background: var(--warm); }
.bg-cream { background: var(--cream); }
.bg-deep  { background: var(--deep); }
.bg-teal  { background: var(--teal); }
.text-white { color: var(--white); }
.divider { width: 40px; height: 3px; background: var(--saffron); margin: 1.5rem 0; border-radius: 2px; }

/* Fade-in */
.fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.75rem 1.75rem;
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
  border-radius: var(--radius-sm); border: none;
  transition: background 0.2s, color 0.2s, transform 0.15s;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary   { background: var(--saffron); color: var(--white); }
.btn-primary:hover { background: var(--saffron-dk); }
.btn-outline   { background: transparent; color: var(--saffron); border: 1.5px solid var(--saffron); }
.btn-outline:hover { background: var(--saffron); color: var(--white); }
.btn-white     { background: var(--white); color: var(--saffron); }
.btn-white:hover { background: var(--cream); }
.btn-ghost     { background: transparent; color: var(--muted); padding: 0.5rem 0; letter-spacing: 0.04em; }
.btn-ghost:hover { color: var(--saffron); }

/* ============================================================
   NAV
   ============================================================ */
#main-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--nav-h);
  display: flex; align-items: center;
  background: rgba(255,255,255,0.97);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.3s;
}
.nav-inner {
  max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter);
  width: 100%;
  display: flex; align-items: center; justify-content: space-between;
}
/* Logo button wrapper */
.nav-logo {
  display: flex; align-items: center;
  background: none; border: none; padding: 0;
  cursor: pointer; flex-shrink: 0;
  text-decoration: none;
}
/* Real logo image — sized for navbar */
.nav-logo-img {
  height: 44px;
  width: auto;
  display: block;
  object-fit: contain;
  object-position: left center;
  transition: opacity 0.2s;
}
.nav-logo:hover .nav-logo-img { opacity: 0.82; }
/* Text fallback — shown only when image errors */
.nav-logo-text {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 900;
  color: var(--saffron); letter-spacing: -0.02em;
}
.nav-logo-text span { color: var(--teal); }
/* Footer logo */
.footer-logo-wrap { margin-bottom: 0.85rem; }
.footer-logo-img {
  height: 38px; width: auto;
  display: block; object-fit: contain;
  opacity: 0.88; transition: opacity 0.2s;
}
.footer-logo-wrap:hover .footer-logo-img { opacity: 1; }
.footer-logo-text {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 900;
  color: var(--saffron); letter-spacing: -0.02em;
}
.footer-logo-text span { color: var(--teal); }
/* Annual reports section on homepage */
.reports-nudge {
  display: flex; align-items: center; gap: 1rem;
  padding: 1.25rem 1.75rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius-md);
  margin-top: 2rem;
}
.reports-nudge-icon { font-size: 1.4rem; flex-shrink: 0; }
.reports-nudge-text { flex: 1; }
.reports-nudge-text p { font-size: 0.92rem; color: var(--muted); line-height: 1.5; }
.reports-nudge-text strong { color: var(--text); font-weight: 500; }
.reports-nudge-link {
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--saffron);
  background: none; border: none; white-space: nowrap;
  transition: color 0.2s; flex-shrink: 0;
}
.reports-nudge-link:hover { color: var(--saffron-dk); text-decoration: underline; }
/* Annual reports page */
.reports-list { margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1px; }
.report-row {
  display: flex; align-items: center; gap: 1.5rem;
  padding: 1.75rem 2rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.report-row:hover { box-shadow: var(--shadow-sm); border-color: rgba(0,0,0,0.14); }
.report-year-badge {
  flex-shrink: 0;
  width: 56px; height: 56px;
  background: var(--warm); border-radius: var(--radius-md);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 1px solid var(--border);
}
.report-year-badge-icon { font-size: 1.1rem; line-height: 1; }
.report-body { flex: 1; min-width: 0; }
.report-title {
  font-family: var(--font-display); font-size: 1.05rem;
  font-weight: 700; color: var(--deep); margin-bottom: 0.25rem;
  line-height: 1.3;
}
.report-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
.report-meta {
  font-family: var(--font-mono); font-size: 0.62rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--saffron); margin-bottom: 0.3rem; display: block;
}
.report-download {
  flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.6rem 1.25rem;
  background: var(--warm); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--text);
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, color 0.2s;
}
.report-download:hover { background: var(--saffron); border-color: var(--saffron); color: var(--white); }
.report-download svg { width: 14px; height: 14px; flex-shrink: 0; transition: fill 0.2s; }
.report-download:hover svg { fill: var(--white); }
.reports-empty {
  padding: 4rem 2rem; text-align: center;
  border: 2px dashed var(--border); border-radius: var(--radius-md);
}
.reports-empty p { color: var(--muted); font-size: 0.92rem; line-height: 1.7; }
@media (max-width: 640px) {
  .report-row { flex-wrap: wrap; gap: 1rem; }
  .report-download { width: 100%; justify-content: center; }
  .nav-logo-img { height: 36px; }
  .reports-nudge { flex-wrap: wrap; }
}
.nav-links {
  display: flex; align-items: center; gap: 0.25rem;
}
.nav-link {
  font-size: 0.8rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--muted); padding: 0.5rem 0.85rem; border-radius: var(--radius-sm);
  transition: color 0.2s, background 0.2s;
  background: none; border: none;
}
.nav-link:hover { color: var(--saffron); background: rgba(232,98,42,0.06); }
.nav-link.active { color: var(--saffron); font-weight: 500; }
.nav-actions { display: flex; align-items: center; gap: 0.75rem; }
.nav-hamburger { display: none; flex-direction: column; gap: 5px; padding: 6px; background: none; border: none; }
.nav-hamburger span { display: block; width: 20px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
.nav-mobile { display: none; }

/* ============================================================
   PAGE WRAPPER
   ============================================================ */
#app { padding-top: var(--nav-h); min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }

/* ============================================================
   HERO
   ============================================================ */
.hero {
  min-height: calc(100vh - var(--nav-h));
  display: grid; grid-template-columns: 1fr 1fr;
  overflow: hidden;
}
.hero-content {
  display: flex; flex-direction: column; justify-content: center;
  padding: 5rem var(--gutter) 5rem calc((100vw - var(--max-w)) / 2 + var(--gutter));
  padding-left: max(var(--gutter), calc((100vw - var(--max-w)) / 2 + var(--gutter)));
}
.hero-tag {
  font-family: var(--font-mono);
  font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--saffron); margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 0.75rem;
}
.hero-tag::before { content: ''; display: block; width: 28px; height: 1px; background: var(--saffron); }
.hero-h1 {
  font-family: var(--font-display);
  font-size: clamp(3rem, 5.5vw, 5rem);
  font-weight: 900; line-height: 1.0;
  color: var(--deep); letter-spacing: -0.03em;
  margin-bottom: 1.5rem;
}
.hero-h1 em { font-style: italic; color: var(--saffron); }
.hero-sub {
  font-size: 1.05rem; line-height: 1.75; color: var(--muted);
  max-width: 420px; font-weight: 300; margin-bottom: 2.5rem;
}
.hero-ctas { display: flex; gap: 0.75rem; flex-wrap: wrap; }
.hero-stats {
  display: flex; gap: 2.5rem;
  margin-top: 4rem; padding-top: 2.5rem;
  border-top: 1px solid var(--cream);
}
.stat-n { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--saffron); line-height: 1; }
.stat-l { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.2rem; }
.hero-visual {
  background: var(--deep); position: relative; overflow: hidden;
}
.hero-mosaic {
  position: absolute; inset: 0;
  display: grid; grid-template-columns: repeat(3,1fr);
  grid-template-rows: repeat(4,1fr); gap: 3px;
}
.m-tile { }
.m-tile:nth-child(1){background:var(--saffron)}.m-tile:nth-child(2){background:var(--teal);grid-row:span 2}.m-tile:nth-child(3){background:var(--gold)}.m-tile:nth-child(4){background:var(--moss);grid-column:span 2}.m-tile:nth-child(5){background:rgba(240,232,216,0.3)}.m-tile:nth-child(6){background:rgba(26,18,8,0.8)}.m-tile:nth-child(7){background:var(--saffron);opacity:.55}.m-tile:nth-child(8){background:var(--gold);grid-row:span 2}.m-tile:nth-child(9){background:var(--teal)}.m-tile:nth-child(10){background:var(--moss)}.m-tile:nth-child(11){background:rgba(240,232,216,0.2);grid-column:span 2}.m-tile:nth-child(12){background:var(--saffron);opacity:.35}
.hero-quote {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.75rem 2rem;
  background: linear-gradient(to top, rgba(26,18,8,0.95) 60%, transparent);
  color: var(--white); z-index: 2;
}
.hero-quote p {
  font-family: var(--font-display);
  font-size: 0.95rem; font-style: italic; line-height: 1.5; opacity: 0.9;
}

/* ============================================================
   MARQUEE
   ============================================================ */
.marquee-bar { background: var(--saffron); padding: 0.75rem 0; overflow: hidden; }
.marquee-track {
  display: flex; gap: 2.5rem; white-space: nowrap;
  animation: marquee 24s linear infinite;
  color: var(--white); font-size: 0.72rem;
  font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
}
.marquee-track span { color: rgba(255,255,255,0.4); }
@keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ============================================================
   HOME — ABOUT STRIP
   ============================================================ */
.about-strip { display: grid; grid-template-columns: 1fr 1fr; }
.about-strip-visual {
  background: var(--teal); padding: 5rem 4rem;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; overflow: hidden;
}
.about-strip-visual::before {
  content: '97'; font-family: var(--font-display);
  font-size: 10rem; font-weight: 900; color: rgba(255,255,255,0.06);
  position: absolute; bottom: -1rem; right: 1.5rem; line-height: 1;
}
.about-strip-visual h2 { font-family: var(--font-display); font-size: 2.4rem; font-weight: 700; color: var(--white); line-height: 1.15; margin-bottom: 1.25rem; }
.about-strip-visual p  { color: rgba(255,255,255,0.72); font-size: 0.95rem; line-height: 1.8; font-weight: 300; max-width: 360px; margin-bottom: 0.75rem; }
.about-strip-content { padding: 5rem 4rem; background: var(--warm); display: flex; flex-direction: column; justify-content: center; }
.about-strip-content p { color: var(--muted); font-size: 0.95rem; line-height: 1.85; font-weight: 300; margin-bottom: 1rem; }
.reg-box { margin-top: 1.75rem; padding: 1.1rem 1.4rem; background: var(--white); border-left: 3px solid var(--gold); }
.reg-box p { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }

/* ============================================================
   PROGRAMMES PREVIEW CARDS
   ============================================================ */
.prog-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 2px; }
.prog-card {
  padding: 2.5rem 2rem; min-height: 340px;
  display: flex; flex-direction: column; justify-content: flex-end;
  position: relative; overflow: hidden;
  transition: transform 0.25s; cursor: pointer;
}
.prog-card:hover { transform: translateY(-4px); }
.prog-card:nth-child(1){background:var(--deep)}
.prog-card:nth-child(2){background:var(--teal)}
.prog-card:nth-child(3){background:var(--moss)}
.prog-card:nth-child(4){background:var(--saffron)}
.prog-card-num { position: absolute; top: 1.25rem; right: 1.25rem; font-family: var(--font-display); font-size: 4rem; font-weight: 900; color: rgba(255,255,255,0.07); line-height: 1; }
.prog-card-icon { font-size: 1.8rem; margin-bottom: 1rem; }
.prog-card-tag { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 0.5rem; }
.prog-card h3 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; color: var(--white); margin-bottom: 0.75rem; }
.prog-card p { font-size: 0.83rem; color: rgba(255,255,255,0.7); line-height: 1.65; font-weight: 300; }

/* ============================================================
   HOW WE WORK
   ============================================================ */
.how-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; margin-top: 3rem; }
.how-card { background: var(--white); padding: 2.5rem 2rem; border: 1px solid var(--border); }
.how-num { font-family: var(--font-display); font-size: 3rem; font-weight: 900; color: var(--cream); line-height: 1; margin-bottom: 1.25rem; }
.how-card h3 { font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; color: var(--deep); margin-bottom: 0.75rem; }
.how-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.75; font-weight: 300; }

/* ============================================================
   STORIES PREVIEW
   ============================================================ */
.stories-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-top: 3rem; }
.story-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius-md); overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s; cursor: pointer;
}
.story-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
.story-card-img {
  width: 100%; aspect-ratio: 16/9;
  object-fit: cover; object-position: center;
  background: var(--cream);
}
.story-card-img-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--cream); display: flex; align-items: center; justify-content: center; }
.story-card-img-placeholder span { font-size: 2.5rem; }
.story-card-body { padding: 1.5rem; }
.story-card-tag { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--saffron); margin-bottom: 0.5rem; }
.story-card h3 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--deep); margin-bottom: 0.5rem; line-height: 1.35; }
.story-card p { font-size: 0.83rem; color: var(--muted); line-height: 1.65; }

/* ============================================================
   HOME CTA BANNER
   ============================================================ */
.cta-banner {
  background: var(--saffron); padding: 5rem var(--gutter);
  text-align: center; position: relative; overflow: hidden;
}
.cta-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.12) 0%, transparent 70%);
}
.cta-banner-inner { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; }
.cta-banner h2 { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; color: var(--white); margin-bottom: 1rem; line-height: 1.15; }
.cta-banner p { color: rgba(255,255,255,0.82); font-size: 1rem; margin-bottom: 2rem; line-height: 1.7; }
.cta-banner-note { font-family: var(--font-mono); font-size: 0.68rem; color: rgba(255,255,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1.25rem; }

/* ============================================================
   ABOUT PAGE
   ============================================================ */
.page-hero {
  background: var(--deep); padding: 5rem 0 4rem;
  position: relative; overflow: hidden;
}
.page-hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(42,107,110,0.25) 0%, transparent 60%);
}
.page-hero-inner { position: relative; z-index: 1; max-width: var(--max-w); margin: 0 auto; padding: 0 var(--gutter); }
.page-hero-label { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: block; }
.page-hero h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; color: var(--white); line-height: 1.05; max-width: 700px; }
.page-hero h1 em { font-style: italic; color: var(--saffron); }
.page-hero p { color: rgba(255,255,255,0.65); font-size: 1rem; max-width: 560px; margin-top: 1.25rem; line-height: 1.8; font-weight: 300; }

.values-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-top: 3rem; }
.value-card { padding: 2rem; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-md); }
.value-icon { font-size: 2rem; margin-bottom: 1rem; }
.value-card h3 { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--deep); margin-bottom: 0.5rem; }
.value-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

.timeline { margin-top: 3rem; border-left: 2px solid var(--cream); padding-left: 2rem; }
.timeline-item { margin-bottom: 2.5rem; position: relative; }
.timeline-item::before { content: ''; position: absolute; left: -2.5rem; top: 0.35rem; width: 10px; height: 10px; border-radius: 50%; background: var(--saffron); border: 2px solid var(--white); outline: 2px solid var(--saffron); }
.timeline-year { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.12em; color: var(--saffron); text-transform: uppercase; margin-bottom: 0.3rem; }
.timeline-item h3 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 700; color: var(--deep); margin-bottom: 0.4rem; }
.timeline-item p { font-size: 0.88rem; color: var(--muted); line-height: 1.7; }

/* ============================================================
   TEAM SECTION (FIXED)
   ============================================================ */
.team-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }

.team-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
}
.team-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }

/* FIXED IMAGE CONTAINER — 3:4 portrait ratio */
.team-img-wrap {
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  background: var(--cream);
  position: relative;
}
.team-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  transition: transform 0.4s ease;
}
.team-card:hover .team-img-wrap img { transform: scale(1.03); }

/* Placeholder for missing photos */
.team-img-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, var(--cream) 0%, #e8dfc8 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.5rem;
}
.team-img-placeholder .initials {
  font-family: var(--font-display);
  font-size: 2.8rem; font-weight: 700;
  color: var(--muted); line-height: 1;
}
.team-img-placeholder .ph-name {
  font-family: var(--font-mono); font-size: 0.65rem;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  opacity: 0.7;
}

.team-card-body { padding: 1.4rem; }
.team-role {
  font-family: var(--font-mono); font-size: 0.65rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--saffron); margin-bottom: 0.3rem;
}
.team-card h3 {
  font-family: var(--font-display); font-size: 1.05rem;
  font-weight: 700; color: var(--deep); margin-bottom: 0.65rem;
  line-height: 1.3;
}
.team-card p { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }

/* ============================================================
   PROGRAMMES PAGE
   ============================================================ */
.prog-detail-grid { display: grid; gap: 3rem; margin-top: 3rem; }
.prog-detail {
  display: grid; grid-template-columns: 280px 1fr; gap: 3rem;
  padding: 3rem; background: var(--white);
  border: 1px solid var(--border); border-radius: var(--radius-md);
  border-left: 4px solid var(--saffron);
}
.prog-detail:nth-child(2) { border-left-color: var(--teal); }
.prog-detail:nth-child(3) { border-left-color: var(--moss); }
.prog-detail:nth-child(4) { border-left-color: var(--gold); }
.prog-detail-sidebar {}
.prog-detail-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.prog-detail-name { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; color: var(--deep); margin-bottom: 0.5rem; }
.prog-detail-tag { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--saffron); }
.prog-detail-content {}
.prog-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.75rem; }
.prog-meta-item {}
.prog-meta-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
.prog-meta-item p { font-size: 0.88rem; color: var(--text); line-height: 1.65; }
.prog-example { background: var(--warm); border-radius: var(--radius-md); padding: 1.25rem; margin-top: 1rem; }
.prog-example-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--saffron); margin-bottom: 0.4rem; }
.prog-example p { font-size: 0.85rem; color: var(--muted); font-style: italic; line-height: 1.7; }

/* ============================================================
   GALLERY
   ============================================================ */
.gallery-tabs { display: flex; gap: 2px; margin-bottom: 2.5rem; flex-wrap: wrap; }
.g-tab {
  padding: 0.65rem 1.5rem;
  font-family: var(--font-mono); font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--cream); color: var(--muted);
  border: none; border-radius: var(--radius-sm);
  transition: background 0.2s, color 0.2s;
}
.g-tab.active { background: var(--saffron); color: var(--white); }
.g-tab:hover:not(.active) { background: #e8dfc8; color: var(--text); }
.gallery-pane { display: none; }
.gallery-pane.active { display: block; }
.gallery-masonry { columns: 4; column-gap: 6px; }
.gallery-masonry img {
  width: 100%; display: block; margin-bottom: 6px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  break-inside: avoid;
  loading: lazy;
}
.gallery-masonry img:hover { opacity: 0.88; transform: scale(1.01); }

/* ============================================================
   LIGHTBOX
   ============================================================ */
#lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.93); z-index: 999;
  align-items: center; justify-content: center; padding: 2rem;
}
#lightbox.open { display: flex; }
#lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: var(--radius-sm); }
.lb-close { position: fixed; top: 1.25rem; right: 1.25rem; background: none; border: none; color: var(--white); font-size: 1.8rem; opacity: 0.7; transition: opacity 0.2s; }
.lb-close:hover { opacity: 1; }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: var(--white); font-size: 1.8rem; padding: 1rem 1.1rem; transition: background 0.2s; }
.lb-nav:hover { background: rgba(255,255,255,0.2); }
.lb-prev { left: 0.5rem; } .lb-next { right: 0.5rem; }
.lb-caption { position: fixed; bottom: 1.25rem; left: 0; right: 0; text-align: center; font-family: var(--font-mono); font-size: 0.78rem; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; }

/* ============================================================
   STORIES PAGE
   ============================================================ */
.stories-listing { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
.story-full {
  display: none; max-width: 700px; margin: 0 auto;
}
.story-full.open { display: block; }
.story-full-back { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--saffron); margin-bottom: 2rem; background: none; border: none; }
.story-full-back:hover { text-decoration: underline; }
.story-full img { width: 100%; aspect-ratio: 16/9; object-fit: cover; object-position: center; border-radius: var(--radius-md); margin-bottom: 2rem; }
.story-full-tag { font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--saffron); margin-bottom: 0.75rem; display: block; }
.story-full h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 900; color: var(--deep); line-height: 1.1; margin-bottom: 1.5rem; }
.story-full-body p { font-size: 0.98rem; color: var(--muted); line-height: 1.9; margin-bottom: 1.25rem; font-weight: 300; }
.story-full-body strong { color: var(--text); font-weight: 500; }

/* ============================================================
   CONTACT PAGE
   ============================================================ */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; }
.contact-info-side { background: var(--deep); padding: 5rem 4rem; display: flex; flex-direction: column; justify-content: center; }
.contact-info-side .section-label { color: var(--gold); }
.contact-info-side h2 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 900; color: var(--white); line-height: 1.1; margin-bottom: 1.25rem; }
.contact-info-side > p { color: rgba(255,255,255,0.6); font-size: 0.95rem; line-height: 1.8; font-weight: 300; margin-bottom: 2.5rem; max-width: 380px; }
.contact-items { display: flex; flex-direction: column; gap: 1.25rem; }
.contact-item { display: flex; gap: 1rem; align-items: flex-start; }
.ci-icon { width: 38px; height: 38px; background: rgba(255,255,255,0.08); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.ci-label { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 0.2rem; }
.ci-val a, .ci-val span { color: rgba(255,255,255,0.78); font-size: 0.88rem; display: block; text-decoration: none; transition: color 0.2s; }
.ci-val a:hover { color: var(--saffron); }
.contact-social { margin-top: 2.5rem; }
.contact-social-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 1rem; }
.social-icons { display: flex; gap: 0.75rem; }
.social-icon {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; text-decoration: none;
}
.social-icon:hover { background: var(--saffron); }
.social-icon svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.7); }
.social-icon:hover svg { fill: var(--white); }

.contact-form-side { background: var(--warm); padding: 5rem 4rem; display: flex; flex-direction: column; justify-content: center; }
.contact-form-side h3 { font-family: var(--font-display); font-size: 1.75rem; font-weight: 700; color: var(--deep); margin-bottom: 2rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { margin-bottom: 1.1rem; }
.form-group label { display: block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%; padding: 0.75rem 1rem;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: var(--font-body); font-size: 0.9rem;
  background: var(--white); color: var(--text);
  transition: border-color 0.2s; outline: none;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus { border-color: var(--saffron); }
.form-group textarea { height: 120px; resize: vertical; }
.form-submit {
  width: 100%; padding: 0.85rem;
  background: var(--saffron); color: var(--white);
  font-family: var(--font-body); font-size: 0.85rem;
  font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
  border: none; border-radius: var(--radius-sm);
  transition: background 0.2s; margin-top: 0.5rem;
}
.form-submit:hover { background: var(--saffron-dk); }

/* ============================================================
   FOOTER
   ============================================================ */
footer {
  background: var(--deep);
  padding: 4.5rem 0 2rem;
}
.footer-grid {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem; margin-bottom: 3.5rem;
  max-width: var(--max-w); margin: 0 auto 3.5rem;
  padding: 0 var(--gutter);
}
.footer-brand {}
.footer-logo { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; color: var(--saffron); }
.footer-logo span { color: var(--teal); }
.footer-desc { color: rgba(255,255,255,0.35); font-size: 0.85rem; line-height: 1.75; max-width: 240px; margin-top: 0.85rem; }
.footer-social { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
.footer-social .social-icon { width: 34px; height: 34px; }
.footer-col h4 { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 1.1rem; }
.footer-col ul { display: flex; flex-direction: column; gap: 0.6rem; }
.footer-col ul li button,
.footer-col ul li a {
  color: rgba(255,255,255,0.48); font-size: 0.83rem;
  background: none; border: none; text-align: left;
  transition: color 0.2s; padding: 0;
}
.footer-col ul li button:hover,
.footer-col ul li a:hover { color: var(--saffron); }
.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 1.75rem;
  max-width: var(--max-w); margin: 0 auto;
  padding: 1.75rem var(--gutter) 0;
  display: flex; justify-content: space-between;
  align-items: center; flex-wrap: wrap; gap: 0.75rem;
}
.footer-copy { color: rgba(255,255,255,0.2); font-size: 0.75rem; }
.footer-reg { font-family: var(--font-mono); font-size: 0.62rem; color: rgba(255,255,255,0.15); letter-spacing: 0.04em; }

/* ============================================================
   IMPACT BAR
   ============================================================ */
.impact-bar {
  background: var(--deep); padding: 4rem 0;
  position: relative; overflow: hidden;
}
.impact-bar::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(232,98,42,0.1) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 50%, rgba(42,107,110,0.1) 0%, transparent 60%);
}
.impact-bar-inner { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(4,1fr); gap: 2px; }
.impact-item { padding: 2rem 1.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
.impact-n { font-family: var(--font-display); font-size: 3rem; font-weight: 900; color: var(--saffron); line-height: 1; margin-bottom: 0.4rem; }
.impact-l { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.42); }
.impact-d { font-size: 0.78rem; color: rgba(255,255,255,0.25); margin-top: 0.3rem; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1024px) {
  :root { --gutter: 1.5rem; }
  .hero { grid-template-columns: 1fr; }
  .hero-content { padding: 3.5rem var(--gutter); }
  .hero-visual { height: 45vh; }
  .about-strip { grid-template-columns: 1fr; }
  .about-strip-visual, .about-strip-content { padding: 3.5rem var(--gutter); }
  .prog-cards { grid-template-columns: 1fr 1fr; }
  .how-grid { grid-template-columns: 1fr 1fr; }
  .stories-grid, .stories-listing { grid-template-columns: 1fr 1fr; }
  .team-grid { grid-template-columns: 1fr 1fr; }
  .values-grid { grid-template-columns: 1fr 1fr; }
  .contact-grid { grid-template-columns: 1fr; }
  .contact-info-side, .contact-form-side { padding: 3.5rem var(--gutter); }
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
  .prog-detail { grid-template-columns: 1fr; gap: 1.5rem; }
  .prog-meta-grid { grid-template-columns: 1fr; }
  .gallery-masonry { columns: 3; }
  .impact-bar-inner { grid-template-columns: 1fr 1fr; }
  .nav-links { display: none; }
  .nav-links.mobile-open {
    display: flex; flex-direction: column;
    position: fixed; top: var(--nav-h); left: 0; right: 0;
    background: var(--white); padding: 1.25rem var(--gutter);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow-md); gap: 0.25rem; z-index: 199;
  }
  .nav-hamburger { display: flex; }
}
@media (max-width: 640px) {
  .section { padding: 4rem 0; }
  .prog-cards { grid-template-columns: 1fr; }
  .stories-grid, .stories-listing { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr 1fr; }
  .values-grid, .how-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr; }
  .hero-stats { flex-wrap: wrap; gap: 1.5rem; }
  .gallery-masonry { columns: 2; }
  .impact-bar-inner { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 400px) {
  .team-grid { grid-template-columns: 1fr; }
}
</style>

function socialIconsHTML(bg = 'rgba(255,255,255,0.08)', size = 38) {
  const s = CONTENT.site.social;
  return Object.entries(s)
    .filter(([_, url]) => url)
    .map(([key, url]) => `
      <a href="${url}" target="_blank" rel="noopener noreferrer"
         class="social-icon" aria-label="${key}"
         style="width:${size}px;height:${size}px;background:${bg}">
        ${ICONS[key] || ''}
      </a>
    `).join('');
}

function teamCardHTML(m) {
  const initials = m.name.split(' ').map(w => w[0]).slice(0,2).join('');
  const imgEl = m.img
    ? `<img src="${m.img}" alt="${m.name}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div class=\\'team-img-placeholder\\'><span class=\\'initials\\'>${initials}</span><span class=\\'ph-name\\'>${m.role}</span></div>'">`
    : `<div class="team-img-placeholder">
         <span class="initials">${initials}</span>
         <span class="ph-name">${m.role}</span>
       </div>`;
  return `
    <article class="team-card fade-in">
      <div class="team-img-wrap">${imgEl}</div>
      <div class="team-card-body">
        <div class="team-role">${m.role}</div>
        <h3>${m.name}</h3>
        <p>${m.bio}</p>
      </div>
    </article>`;
}

function progCardHTML(p, i) {
  return `
    <div class="prog-card fade-in" onclick="Router.go('programs')" role="button" tabindex="0"
         aria-label="Learn about ${p.name}">
      <div class="prog-card-num">0${i+1}</div>
      <div class="prog-card-icon">${p.icon}</div>
      <div class="prog-card-tag">${p.tag}</div>
      <h3>${p.name}</h3>
      <p>${p.what.substring(0,90)}…</p>
    </div>`;
}

function storyCardHTML(s) {
  const imgEl = s.img
    ? `<img class="story-card-img" src="${s.img}" alt="${s.title}" loading="lazy">`
    : `<div class="story-card-img-placeholder"><span>📖</span></div>`;
  return `
    <article class="story-card fade-in" onclick="openStory('${s.id}')" role="button" tabindex="0"
             aria-label="Read story: ${s.title}">
      ${imgEl}
      <div class="story-card-body">
        <div class="story-card-tag">${s.tag}</div>
        <h3>${s.title}</h3>
        <p>${s.excerpt}</p>
      </div>
    </article>`;
}

function galleryHTML(items, galleryId) {
  return items.map((item, i) =>
    `<img src="${item.src}" alt="${item.alt}" loading="lazy"
          onclick="LB.open('${galleryId}', ${i})"
          title="${item.alt}">`
  ).join('');
}

/* ============================================================
   ROUTER
   ============================================================ */
const Router = {
  current: null,
  meta: {
    home:     { title: "SAHER — Building Peace in Mumbai",           desc: "Society for Awareness, Harmony and Equal Rights. Empowering youth in Jogeshwari, Mumbai since 1997." },
    about:    { title: "About SAHER — Our Story & Team",             desc: "Learn about SAHER's 27-year journey building communal peace in Jogeshwari, Mumbai, and meet our board of trustees." },
    programs: { title: "Our Programmes — SAHER",                     desc: "Parwaaz, Neenv, Mohalla Hamara, and Sports 4 Peace — four pathways to change for marginalised youth in Mumbai." },
    stories:  { title: "Stories of Change — SAHER",                  desc: "Real stories of young people whose lives changed through SAHER's programmes in Jogeshwari, Mumbai." },
    reports:  { title: "Annual Reports — SAHER",                     desc: "Download SAHER's annual reports — programme reach, community impact, financial data, and key learnings published every year." },
    contact:  { title: "Contact & Donate — SAHER",                   desc: "Get involved with SAHER. Volunteer, donate, or partner with us to build peace in Mumbai." }
  },
  go(page) {
    if (!Pages[page]) page = 'home';
    this.current = page;
    window.location.hash = page === 'home' ? '' : page;
    const app = document.getElementById('app');
    app.innerHTML = Pages[page]();
    // Update meta
    const m = this.meta[page] || this.meta.home;
    document.title = m.title;
    document.querySelector('meta[name="description"]').content = m.desc;
    // Update nav active
    document.querySelectorAll('.nav-link').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });
    // Close mobile nav
    document.getElementById('nav-links').classList.remove('mobile-open');
    document.getElementById('hamburger').setAttribute('aria-expanded','false');
    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'instant' });
    // Activate fade-ins
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.querySelectorAll('.fade-in').forEach(el => {
          const io = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); } });
          }, { threshold: 0.1 });
          io.observe(el);
        });
      });
    });
  },
  init() {
    const hash = window.location.hash.replace('#','') || 'home';
    this.go(hash);
    window.addEventListener('hashchange', () => {
      const h = window.location.hash.replace('#','') || 'home';
      if (h !== this.current) this.go(h);
    });
  }
};

function switchGallery(tab, btn) {
  document.querySelectorAll('.gallery-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('gal-' + tab).classList.add('active');
  btn.classList.add('active');
}

/* ============================================================
   LIGHTBOX
   ============================================================ */
const LB = {
  imgs: [], idx: 0,
  open(galleryId, idx) {
    const els = document.querySelectorAll('#' + galleryId + ' img');
    this.imgs = Array.from(els).map(el => ({ src: el.src, alt: el.alt }));
    this.idx  = idx;
    this.show();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  },
  show() {
    const i = this.imgs[this.idx];
    document.getElementById('lb-img').src = i.src;
    document.getElementById('lb-img').alt = i.alt;
    document.getElementById('lb-cap').textContent = i.alt + ' · ' + (this.idx+1) + ' / ' + this.imgs.length;
  },
  nav(d) { this.idx = (this.idx + d + this.imgs.length) % this.imgs.length; this.show(); },
  close() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  },
  closeBg(e) { if (e.target.id === 'lightbox') this.close(); }
};
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') LB.nav(1);
  if (e.key === 'ArrowLeft')  LB.nav(-1);
  if (e.key === 'Escape')     LB.close();
});

/* ============================================================
   STORY READER
   ============================================================ */
function openStory(id) {
  const s = CONTENT.stories.find(x => x.id === id);
  if (!s) return;
  document.getElementById('stories-listing').style.display = 'none';
  const imgEl = s.img
    ? `<img src="${s.img}" alt="${s.title}" loading="lazy">`
    : `<div style="width:100%;aspect-ratio:16/9;background:var(--cream);border-radius:6px;margin-bottom:2rem"></div>`;
  document.getElementById('story-detail').innerHTML = `
    <div class="story-full open">
      <button class="story-full-back" onclick="closeStory()">← Back to stories</button>
      ${imgEl}
      <span class="story-full-tag">${s.tag}</span>
      <h1>${s.title}</h1>
      <div class="story-full-body">
        ${s.body.map(p => `<p>${p}</p>`).join('')}
      </div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeStory() {
  document.getElementById('stories-listing').style.display = '';
  document.getElementById('story-detail').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================================
   NAV TOGGLE
   ============================================================ */
function toggleNav() {
  const nl  = document.getElementById('nav-links');
  const btn = document.getElementById('hamburger');
  const open = nl.classList.toggle('mobile-open');
  btn.setAttribute('aria-expanded', open);
}

/* ============================================================
   FORM
   ============================================================ */
function submitForm(btn) {
  btn.textContent = 'Message Sent ✓';
  btn.style.background = 'var(--moss)';
  setTimeout(() => {
    btn.textContent = 'Send Message';
    btn.style.background = '';
  }, 3500);
}

/* ============================================================
   REPORT DOWNLOAD HANDLER
   Gracefully handles missing PDFs in dev/staging environments.
   In production, simply link real PDF files and this passes through.
   ============================================================ */
function handleReportDownload(e, filePath, title) {
  // Check if we're in a context where the file likely doesn't exist yet
  // (e.g. local dev, Netlify preview without actual PDFs uploaded)
  // In production with real PDFs uploaded, the browser handles it natively.
  // This provides a graceful message if the file 404s.
  const link = e.currentTarget;
  // Attach a one-time error handler via fetch check
  fetch(filePath, { method: 'HEAD' })
    .then(res => {
      if (!res.ok) {
        e.preventDefault();
        alert(`"${title}" is not yet available for download.\n\nPlease contact us at trustees@saherindia.org to request a copy.`);
      }
      // If ok, let the native download proceed (don't preventDefault)
    })
    .catch(() => {
      // Network error or file not found — notify user
      e.preventDefault();
      alert(`"${title}" is not yet available for download.\n\nPlease contact us at trustees@saherindia.org to request a copy.`);
    });
  // Return true to allow default download to begin — fetch check runs in parallel
  return true;
}

renderFooter();
Router.init();
